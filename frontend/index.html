<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O2mation · Market</title>
    <script>
      (function() {
        try {
          const locale = localStorage.getItem('o2_locale');
          if (locale === 'ar') {
            document.documentElement.dir = 'rtl';
            document.documentElement.lang = 'ar';
          }
          const fontSize = localStorage.getItem('o2_font_size');
          const fontSizeMap = { small: '13px', default: '14px', large: '15px' };
          if (fontSize && fontSizeMap[fontSize]) {
            document.documentElement.style.fontSize = fontSizeMap[fontSize];
          }
          const theme = localStorage.getItem('theme');
          if (theme) {
            document.documentElement.classList.add(theme);
            document.documentElement.style.colorScheme = theme;
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
